name: E2E Testnet Dual Node

on:
  workflow_dispatch:

jobs:
  e2e-testnet-dual-node:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Run dual-node testnet E2E
        env:
          SKIP_BUILD: '1'
          SKIP_BINARY_DOWNLOAD: '0'
          CLEAR_BEFORE_RUN: '1'
          FIBER_KEY_PASSWORD: fiber-pay-e2e-key
          CHANNEL_FUNDING_CKB: '200'
          INVOICE_AMOUNT_CKB: '1'
          STOP_NODES_ON_EXIT: '1'
        run: pnpm e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-dual-node-artifacts
          path: .artifacts/e2e-dual-node-*
          if-no-files-found: ignore
