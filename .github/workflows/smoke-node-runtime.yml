name: Smoke Node Runtime

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-node-runtime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI dependency chain
        run: |
          pnpm --filter @fiber-pay/sdk build
          pnpm --filter @fiber-pay/node build
          pnpm --filter @fiber-pay/runtime build
          pnpm --filter @fiber-pay/cli build

      - name: Link fiber-pay CLI globally via pnpm
        working-directory: packages/cli
        run: pnpm link --global

      - name: Resolve linked fiber-pay binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $globalRoot = pnpm root -g
          $globalBin = Join-Path $globalRoot '.bin'
          $globalBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $fiberPayBin = Join-Path $globalBin 'fiber-pay.cmd'
          "FIBER_PAY_BIN=$fiberPayBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (-not (Test-Path $fiberPayBin)) {
            Write-Host "fiber-pay.cmd not found at: $fiberPayBin"
            Write-Host "Resolved global root: $globalRoot"
            Write-Host "Resolved global bin: $globalBin"
            if (Test-Path $globalBin) {
              Get-ChildItem -Force $globalBin | Select-Object Name, FullName
            }
            throw "linked fiber-pay binary not found"
          }

      - name: Resolve linked fiber-pay binary (Unix)
        if: runner.os != 'Windows'
        run: |
          GLOBAL_ROOT="$(pnpm root -g)"
          GLOBAL_BIN="$GLOBAL_ROOT/.bin"
          echo "$GLOBAL_BIN" >> "$GITHUB_PATH"
          echo "FIBER_PAY_BIN=$GLOBAL_BIN/fiber-pay" >> "$GITHUB_ENV"
          if [[ ! -x "$GLOBAL_BIN/fiber-pay" ]]; then
            echo "fiber-pay not found at: $GLOBAL_BIN/fiber-pay"
            echo "Resolved global root: $GLOBAL_ROOT"
            echo "Resolved global bin: $GLOBAL_BIN"
            ls -la "$GLOBAL_BIN" || true
            exit 1
          fi

      - name: Verify linked fiber-pay command (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & "$env:FIBER_PAY_BIN" --help

      - name: Verify linked fiber-pay command (Unix)
        if: runner.os != 'Windows'
        run: '"$FIBER_PAY_BIN" --help'

      - name: Run node/runtime smoke test
        shell: bash
        run: node scripts/ci-smoke-node-runtime.mjs

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-node-runtime-${{ matrix.os }}
          path: ${{ runner.temp }}/fiber-pay-ci-smoke-*
          if-no-files-found: ignore
