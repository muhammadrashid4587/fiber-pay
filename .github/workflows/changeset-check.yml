name: Changeset Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    name: changeset-required
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changeset') }}
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changeset
        id: changeset
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          CHANGESET_FILES=$(git diff --name-only "$BASE_SHA"..."$HEAD_SHA" -- '.changeset/*.md' | grep -v 'README.md' || true)

          if [ -z "$CHANGESET_FILES" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Changesets found:"
            echo "$CHANGESET_FILES"
          fi

      - name: Warn if missing
        if: steps.changeset.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- changeset-check -->';
            const issue_number = context.payload.pull_request.number;

            const body = [
              marker,
              '### ⚠️ Missing Changeset',
              '',
              'This PR does not include a changeset. If this PR changes any package behaviour, please run:',
              '',
              '```sh',
              'pnpm changeset',
              '```',
              '',
              'If this is a docs-only, CI, or chore change that does **not** need a version bump, add the `skip-changeset` label to this PR.',
            ].join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

            core.setFailed('No changeset found. Add one with `pnpm changeset` or add the `skip-changeset` label.');

      - name: Clean up comment if changeset exists
        if: steps.changeset.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- changeset-check -->';
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }
