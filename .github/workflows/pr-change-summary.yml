name: PR Change Summary

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    name: summarize-risk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head commit ref
        run: |
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr-head"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate change summary
        run: |
          node scripts/pr-change-summary.mjs \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "pr-head" \
            --json-out pr-change-summary.json \
            --md-out pr-change-summary.md

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-change-summary
          path: |
            pr-change-summary.json
            pr-change-summary.md

      - name: Append to workflow summary
        run: cat pr-change-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- pr-change-summary -->';
            const body = fs.readFileSync('pr-change-summary.md', 'utf8');
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
